# ─── Device privilege hierarchy (the crown-jewel map) ───────────────────────
# Copy to data/inventory_seed.yaml and edit for YOUR devices. The real file is
# gitignored so your MAC/device map never lands in version control.
#
# Keyed by MAC (lowercase) so DHCP address churn never reclassifies a device.
# Tiers, most-privileged first:
#   crown  — approval authority (the device that says "yes")
#   vault  — credential authority (mints short-lived secrets)
#   core   — infrastructure you own/operate
#   daily  — personal daily-use machines
#   iot    — appliances (printers, speakers, TVs, cameras)
#   guest  — transient but known-benign
#   unknown— unclassified; surfaces for a human look
#
# Edit freely. `shallot inventory scan` re-applies this on every run.

devices:
  "aa:bb:cc:00:00:01": {tier: crown, role: "primary workstation / approval authority"}
  "aa:bb:cc:00:00:02": {tier: vault, role: "main server / credential authority + control plane"}
  "aa:bb:cc:00:00:03": {tier: core,  role: "compute/storage node"}
  "aa:bb:cc:00:00:04": {tier: core,  role: "home router / gateway"}
  "aa:bb:cc:00:00:05": {tier: daily, role: "laptop"}

# Ordered heuristic fallbacks for MACs not seeded above.
rules:
  - {match: {os_guess: printer},        tier: iot,   role: "printer"}
  - {match: {os_guess: chromecast},     tier: iot,   role: "cast device"}
  - {match: {vendor_contains: amazon},  tier: iot,   role: "amazon device"}
  - {match: {os_guess: apple},          tier: daily, role: "apple device (unseeded)"}
  - {match: {os_guess: windows},        tier: daily, role: "windows device (unseeded)"}
  # Unseeded linux hosts stay 'unknown' on purpose — they should get a human look.
